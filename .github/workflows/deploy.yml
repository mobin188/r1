name: CI/CD - Production Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 10m
          script: |
            echo "========================================"
            echo "🚀 Starting Full Production Deployment"
            echo "========================================"

            # Create project directory
            sudo mkdir -p /var/www/r1
            sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} /var/www/r1
            cd /var/www/r1

            # Clone or Pull code
            if [ ! -d ".git" ]; then
              echo "📥 Cloning repository..."
              git clone https://github.com/mobin188/r1.git .
            else
              echo "📥 Pulling latest changes..."
              git pull origin main
            fi

            # Ensure .env exists
            if [ ! -f ".env" ]; then
              echo "⚠️  .env file not found. Copying from example..."
              cp .env.example .env
              echo "Please edit /var/www/r1/.env with your SECRET_KEY and other settings!"
            fi

            # Fix Docker permissions
            echo "🔧 Fixing Docker permissions..."
            sudo usermod -aG docker ${{ secrets.VPS_USER }} || true

            # Deploy using production compose
            echo "🛑 Stopping old containers..."
            docker compose -f docker-compose.prod.yml down --remove-orphans || true

            echo "🏗️  Building and starting production..."
            docker compose -f docker-compose.prod.yml up -d --build

            echo "✅ Deployment completed at $(date)"
            echo "🌐 Check status with: docker compose -f docker-compose.prod.yml ps"
            echo "📊 Logs: docker compose -f docker-compose.prod.yml logs -f"
