services:
  web:
    image: ghcr.io/mobin188/r1:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    stop_grace_period: 30s

    ports:
      - "${HOST_PORT:-5000}:8001"

    env_file:
      - .env

    command: gunicorn --config gunicorn_config.py wsgi:app

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true

    networks:
      - mobin-network

networks:
  mobin-network:
    external: true
