services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: r1-web
    restart: unless-stopped
    ports:
      - "5000:8001"
    env_file:
      - .env
    command: gunicorn --config gunicorn_config.py wsgi:app

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
