version: "3.9"

services:
  app:
    image: ghcr.io/mobin188/r1:${IMAGE_TAG:-latest}
    container_name: r1-${SLOT:-blue}
    restart: unless-stopped

    ports:
      - "${HOST_PORT:-5000}:5000"

    env_file:
      - .env

    environment:
      - FLASK_ENV=production

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

    # Logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # Healthcheck
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 15s
