services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: r1-web
    ports:
      - "5000:5000"
    networks:
      - mobin-network
    env_file:
      - .env
    environment:
      - FLASK_DEBUG=1
      - FLASK_APP=app:create_app
    volumes:
      - .:/app
    command: flask run --host=0.0.0.0 --port=5000 --reload

networks:
  mobin-network:
    external: true
